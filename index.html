<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Night Oracle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-5;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:.6;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{
    50%{
        opacity:1;
    }
}

.glow1,.glow2{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-4;
}

.glow1{
    background:#7b2ff740;
    top:-150px;
    left:-100px;
}

.glow2{
    background:#3d8bff30;
    bottom:-150px;
    right:-100px;
}

/* LOADING */

.loading{
    position:fixed;
    width:100%;
    height:100vh;
    background:#050816;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    transition:1s;
}

.magic-circle{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid #ffffff10;
    border-top:4px solid #c89fff;
    animation:spin 2s linear infinite;
    box-shadow:0 0 40px #7b2ff7;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.loading p{
    margin-top:25px;
    opacity:.8;
}

/* MAIN */

.container{
    max-width:1500px;
    margin:auto;
    padding:50px 20px;
}

.hero{
    text-align:center;
}

.logo{
    font-size:85px;
}

h1{
    font-size:70px;
    background:linear-gradient(to right,#fff,#d6b1ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:15px;
    opacity:.7;
    line-height:1.8;
}

/* GLASS */

.glass{
    margin-top:40px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:35px;
    padding:35px;
    box-shadow:0 0 40px rgba(123,47,247,.15);
}

/* INPUT */

input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#10192f;
    color:white;
    margin-top:15px;
    border:1px solid transparent;
    transition:.3s;
}

input:focus{
    border:1px solid #c89fff;
    box-shadow:0 0 20px rgba(123,47,247,.4);
}

/* CARDS */

.cards{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:25px;
}

.card{
    height:300px;
    perspective:1000px;
    cursor:pointer;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:25px;
    backface-visibility:hidden;
}

.front{
    background:linear-gradient(135deg,#131d39,#7b2ff7);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(123,47,247,.5);
}

.front::before{
    content:'';
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,255,255,.08);
    transform:rotate(45deg);
    animation:shine 5s infinite;
}

@keyframes shine{
    from{
        left:-300px;
    }
    to{
        left:300px;
    }
}

.back{
    background:#10192f;
    transform:rotateY(180deg);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    border:1px solid rgba(255,255,255,.08);
}

.back h2{
    margin-top:10px;
}

.back p{
    margin-top:12px;
    opacity:.8;
    line-height:1.7;
    font-size:14px;
}

.selected{
    outline:4px solid #d6b1ff;
    transform:scale(1.04);
}

/* RESULT */

.result{
    display:none;
    margin-top:50px;
    animation:fade 1s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.result-box{
    background:#10192f;
    border-radius:30px;
    padding:35px;
}

.result-box h2{
    margin-bottom:20px;
}

.result-box p{
    line-height:2;
    opacity:.85;
    white-space:pre-line;
}

/* HISTORY */

.history{
    margin-top:50px;
}

.history-item{
    background:#0f1730;
    padding:20px;
    border-radius:20px;
    margin-top:15px;
    border:1px solid rgba(255,255,255,.05);
}

.date{
    opacity:.5;
    font-size:13px;
    margin-bottom:10px;
}

/* MOBILE */

@media(max-width:768px){

    h1{
        font-size:45px;
    }

    .card{
        height:240px;
    }

}

</style>
</head>

<body>

<div class="loading" id="loading">

    <div class="magic-circle"></div>

    <p>
        กำลังเชื่อมต่อกับเส้นทางโชคชะตา...
    </p>

</div>

<div class="stars" id="stars"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

    <div class="hero">

        <div class="logo">🔮</div>

        <h1>Night Oracle</h1>

        <div class="subtitle">
            เลือกไพ่ 3 ใบจาก 10 ใบ <br>
            ไพ่จะวิเคราะห์แบบ Past • Present • Future จริง
        </div>

    </div>

    <div class="glass">

        <label>ชื่อของคุณ</label>

        <input type="text" id="name" placeholder="เช่น เติ้ช">

        <div class="cards" id="cards"></div>

        <div class="result" id="result">

            <div class="result-box">

                <h2>
                    ✨ คำทำนายจากไพ่
                </h2>

                <p id="finalText"></p>

            </div>

        </div>

        <div class="history">

            <h2>
                📜 ประวัติคำทำนาย
            </h2>

            <div id="history"></div>

        </div>

    </div>

</div>

<script>

/* LOADING */

window.onload = ()=>{

    setTimeout(()=>{
        loading.style.opacity = "0"
        loading.style.pointerEvents = "none"
    },2000)

    loadHistory()

}

/* STARS */

for(let i=0;i<250;i++){

    let s = document.createElement("div")

    s.classList.add("star")

    s.style.left = Math.random()*100+"%"
    s.style.top = Math.random()*100+"%"

    s.style.animationDuration =
        (Math.random()*5+2)+"s"

    stars.appendChild(s)

}

/* TAROT */

const tarot = [

{
icon:"🌙",
name:"The Moon",
past:"อดีตเต็มไปด้วยความไม่ชัดเจน หรือความสัมพันธ์ที่ยังค้างคาใจ",
present:"ตอนนี้คุณกำลังคิดมากและสับสนกับบางเรื่อง",
future:"อนาคตจะเริ่มชัดขึ้นเมื่อคุณยอมรับความจริงบางอย่าง"
},

{
icon:"☀️",
name:"The Sun",
past:"อดีตเคยมีช่วงเวลาที่สดใสและมีความสุข",
present:"ตอนนี้ดวงกำลังเปิด มีโอกาสใหม่เข้ามา",
future:"อนาคตมีแนวโน้มประสบความสำเร็จสูง"
},

{
icon:"🗡️",
name:"The Sword",
past:"คุณเคยผ่านการตัดสินใจที่ยากลำบาก",
present:"ตอนนี้มีเรื่องที่ต้องเลือกหรือเผชิญหน้า",
future:"หากกล้าตัดสินใจ ชีวิตจะเปลี่ยนไปมาก"
},

{
icon:"💜",
name:"The Heart",
past:"เรื่องความรักหรือความสัมพันธ์ส่งผลต่อชีวิตคุณมาก",
present:"ตอนนี้มีคนกำลังคิดถึงหรือจับตามองคุณ",
future:"อนาคตมีโอกาสเกิดความสัมพันธ์สำคัญ"
},

{
icon:"🔥",
name:"The Flame",
past:"อดีตมีการเปลี่ยนแปลงครั้งใหญ่",
present:"ตอนนี้พลังงานชีวิตแรงมาก",
future:"อนาคตกำลังเข้าสู่ช่วงเปลี่ยนชีวิต"
},

{
icon:"👁️",
name:"The Eye",
past:"คุณเคยมองข้ามสัญชาตญาณตัวเอง",
present:"ตอนนี้เซนส์ของคุณแม่นมาก",
future:"จะเริ่มเห็นความจริงของบางคน"
},

{
icon:"🌊",
name:"The Ocean",
past:"คุณเคยจมอยู่กับอารมณ์ตัวเอง",
present:"ตอนนี้ยังมีความลังเลในใจ",
future:"อนาคตจะสงบขึ้นเมื่อปล่อยวาง"
},

{
icon:"⚡",
name:"The Thunder",
past:"อดีตมีเหตุการณ์ไม่คาดคิดเกิดขึ้น",
present:"ตอนนี้มีพลังแห่งการเปลี่ยนแปลง",
future:"เร็วๆนี้จะมีเรื่องที่เปลี่ยนชีวิตคุณ"
},

{
icon:"🌹",
name:"The Rose",
past:"คุณเคยได้รับความรักที่ลึกซึ้ง",
present:"ตอนนี้เสน่ห์ของคุณโดดเด่นมาก",
future:"อนาคตมีคนเข้ามาทำให้หัวใจเปลี่ยน"
},

{
icon:"🕯️",
name:"The Candle",
past:"คุณเคยผ่านช่วงเวลามืดมน",
present:"ตอนนี้เริ่มมองเห็นความหวัง",
future:"อนาคตจะเริ่มดีขึ้นอย่างช้าๆ"
}

]

/* CREATE CARDS */

const cardsBox =
    document.getElementById("cards")

const selected = []

tarot.forEach((card,index)=>{

cardsBox.innerHTML += `

<div class="card" onclick="selectCard(this,${index})">

    <div class="card-inner">

        <div class="front">
            ✨
        </div>

        <div class="back">

            <div style="font-size:55px;">
                ${card.icon}
            </div>

            <h2>${card.name}</h2>

        </div>

    </div>

</div>

`

})

/* SELECT */

function selectCard(el,index){

    if(selected.length >= 3 &&
       !el.classList.contains("selected")){
        return
    }

    el.classList.toggle("flipped")
    el.classList.toggle("selected")

    const exists =
        selected.includes(index)

    if(exists){

        selected.splice(
            selected.indexOf(index),1
        )

    }else{

        selected.push(index)

    }

    if(selected.length === 3){

        generateReading()

    }else{

        result.style.display = "none"

    }

}

/* GENERATE */

function generateReading(){

    const name =
        document.getElementById("name").value

    if(name === ""){
        alert("กรุณากรอกชื่อ")
        return
    }

    const past =
        tarot[selected[0]]

    const present =
        tarot[selected[1]]

    const future =
        tarot[selected[2]]

    let combination = ""

    /* COMBO ANALYSIS */

    if(
        past.name === "The Moon" &&
        future.name === "The Sun"
    ){

        combination =
        "ไพ่ชุดนี้หมายถึงการเดินออกจากช่วงเวลาที่สับสน ไปสู่ช่วงชีวิตที่ชัดเจนและสดใสกว่าเดิม"

    }

    else if(
        present.name === "The Thunder" &&
        future.name === "The Flame"
    ){

        combination =
        "มีแนวโน้มเกิดการเปลี่ยนแปลงครั้งใหญ่แบบรวดเร็ว อาจเป็นเรื่องงาน ความสัมพันธ์ หรือเป้าหมายชีวิต"

    }

    else if(
        past.name === "The Heart" &&
        future.name === "The Rose"
    ){

        combination =
        "ไพ่ชุดนี้เด่นเรื่องความรักมาก คนเก่าหรือความสัมพันธ์เก่าอาจกลับเข้ามาอีกครั้ง"

    }

    else if(
        present.name === "The Ocean" &&
        future.name === "The Candle"
    ){

        combination =
        "แม้ตอนนี้จะยังสับสน แต่สุดท้ายคุณจะค่อยๆเจอทางออกและเริ่มกลับมาสบายใจ"

    }

    else{

        combination =
        "ไพ่ทั้งสามใบสะท้อนว่าชีวิตของคุณกำลังเข้าสู่ช่วงเปลี่ยนผ่านสำคัญ มีทั้งบททดสอบและโอกาสใหม่รออยู่"

    }

    const text = `

🔮 ไพ่ใบแรก : ${past.name}
${past.past}

✨ ไพ่ใบที่สอง : ${present.name}
${present.present}

🌠 ไพ่ใบที่สาม : ${future.name}
${future.future}

📜 บทสรุปจากไพ่
${combination}

`

    document.getElementById("finalText")
        .innerHTML = text

    result.style.display = "block"

    /* SAVE */

    const history =
        JSON.parse(localStorage.getItem("nightOracleHistory")) || []

    history.unshift({

        date:new Date().toLocaleString("th-TH"),

        text:text,

        cards:
            `${past.name}, ${present.name}, ${future.name}`

    })

    localStorage.setItem(
        "nightOracleHistory",
        JSON.stringify(history)
    )

    loadHistory()

}

/* HISTORY */

function loadHistory(){

    const history =
        JSON.parse(localStorage.getItem("nightOracleHistory")) || []

    const historyBox =
        document.getElementById("history")

    historyBox.innerHTML = ""

    if(history.length === 0){

        historyBox.innerHTML =
        `<div style="opacity:.5;margin-top:15px;">
            ยังไม่มีประวัติ
        </div>`

        return
    }

    history.slice(0,10).forEach(item=>{

        historyBox.innerHTML += `

        <div class="history-item">

            <div class="date">
                ${item.date}
            </div>

            <h3>
                🔮 ${item.cards}
            </h3>

            <p style="margin-top:10px;line-height:1.8;opacity:.8;">
                ${item.text}
            </p>

        </div>

        `

    })

}

</script>

</body>
</html>
