<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Night Oracle Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    background:#050816;
    overflow-x:hidden;
    color:white;
}

/* BACKGROUND */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-3;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:.6;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{
    50%{
        opacity:1;
    }
}

.glow1,.glow2{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-2;
}

.glow1{
    background:#7b2ff740;
    top:-150px;
    left:-100px;
}

.glow2{
    background:#2f8df740;
    bottom:-150px;
    right:-100px;
}

/* LOADING */

.loading{
    position:fixed;
    width:100%;
    height:100vh;
    background:#050816;
    z-index:999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s;
}

.magic{
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid #ffffff10;
    border-top:4px solid #b68cff;
    animation:spin 2s linear infinite;
    box-shadow:0 0 40px #7b2ff7;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.loading p{
    margin-top:25px;
    opacity:.8;
}

/* MAIN */

.container{
    max-width:1300px;
    margin:auto;
    padding:50px 20px;
}

.hero{
    text-align:center;
    margin-bottom:60px;
}

.logo{
    font-size:80px;
}

h1{
    font-size:65px;
    background:linear-gradient(to right,#fff,#b88fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:15px;
    opacity:.7;
    line-height:1.8;
}

/* GLASS */

.glass{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:30px;
    box-shadow:0 0 40px rgba(123,47,247,.15);
}

/* FORM */

.form-box{
    padding:35px;
    margin-bottom:40px;
}

input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#10192f;
    color:white;
    margin-top:10px;
    border:1px solid transparent;
    transition:.3s;
}

input:focus{
    border:1px solid #b68cff;
    box-shadow:0 0 20px rgba(123,47,247,.4);
}

button{
    margin-top:25px;
    width:100%;
    border:none;
    padding:18px;
    border-radius:18px;
    background:linear-gradient(45deg,#7b2ff7,#c08fff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 25px rgba(123,47,247,.5);
}

button:hover{
    transform:translateY(-3px);
}

/* CARDS */

.cards-container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    margin-top:40px;
}

.tarot-card{
    width:180px;
    height:300px;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
    cursor:pointer;
}

.tarot-card.flip{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:25px;
    backface-visibility:hidden;
}

.front{
    background:linear-gradient(135deg,#111a34,#7b2ff7);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    overflow:hidden;
    box-shadow:0 0 35px rgba(123,47,247,.5);
}

.front::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,.1);
    transform:rotate(45deg);
    animation:shine 5s infinite;
}

@keyframes shine{
    from{
        left:-300px;
    }
    to{
        left:300px;
    }
}

.back{
    background:#10192f;
    transform:rotateY(180deg);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    border:1px solid rgba(255,255,255,.08);
}

.back h2{
    margin-top:10px;
}

.back p{
    margin-top:15px;
    opacity:.8;
    line-height:1.7;
    font-size:14px;
}

/* FINAL RESULT */

.final-box{
    margin-top:50px;
    padding:35px;
    display:none;
    animation:fade 1s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.final-box h2{
    margin-bottom:20px;
}

.energy{
    margin-top:25px;
}

.bar{
    width:100%;
    height:14px;
    background:#1d2645;
    border-radius:20px;
    overflow:hidden;
    margin-top:8px;
    margin-bottom:18px;
}

.fill{
    height:100%;
    border-radius:20px;
    background:linear-gradient(90deg,#7b2ff7,#d6afff);
}

/* HISTORY */

.history{
    margin-top:50px;
}

.history-item{
    background:#0f1730;
    padding:20px;
    border-radius:20px;
    margin-top:15px;
    border:1px solid rgba(255,255,255,.05);
}

.date{
    opacity:.5;
    font-size:13px;
    margin-bottom:10px;
}

@media(max-width:768px){

    h1{
        font-size:45px;
    }

    .tarot-card{
        width:140px;
        height:240px;
    }

}

</style>
</head>

<body>

<div class="loading" id="loading">
    <div class="magic"></div>
    <p>กำลังอ่านเส้นทางโชคชะตา...</p>
</div>

<div class="stars" id="stars"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

    <div class="hero">

        <div class="logo">🔮</div>

        <h1>Night Oracle</h1>

        <div class="subtitle">
            เปิดไพ่ 3 ใบ • อดีต ปัจจุบัน อนาคต <br>
            AI จะรวมคำทำนายให้แบบสมจริง
        </div>

    </div>

    <div class="glass form-box">

        <label>ชื่อของคุณ</label>

        <input type="text" id="name" placeholder="เช่น เติ้ช">

        <button onclick="startReading()">
            เริ่มเปิดไพ่
        </button>

    </div>

    <div class="cards-container" id="cards"></div>

    <div class="glass final-box" id="finalBox">

        <h2>✨ คำทำนายรวม</h2>

        <p id="finalText"></p>

        <div class="energy">

            Aura Energy
            <div class="bar">
                <div class="fill" id="aura"></div>
            </div>

            Love Luck
            <div class="bar">
                <div class="fill" id="love"></div>
            </div>

            Fortune
            <div class="bar">
                <div class="fill" id="fortune"></div>
            </div>

        </div>

    </div>

    <div class="history">

        <h2>📜 ประวัติคำทำนาย</h2>

        <div id="history"></div>

    </div>

</div>

<script>

/* LOADING */

window.onload = ()=>{

    setTimeout(()=>{
        loading.style.opacity = "0"
        loading.style.pointerEvents = "none"
    },2200)

    loadHistory()

}

/* STARS */

for(let i=0;i<250;i++){

    let star = document.createElement("div")
    star.classList.add("star")

    star.style.left = Math.random()*100+"%"
    star.style.top = Math.random()*100+"%"

    star.style.animationDuration =
        (Math.random()*5+2)+"s"

    stars.appendChild(star)

}

/* TAROT */

const tarot = [

{
icon:"🌙",
name:"The Moon",
meaning:"มีความลับหรือความรู้สึกบางอย่างที่ยังไม่เปิดเผย"
},

{
icon:"☀️",
name:"The Sun",
meaning:"ช่วงเวลาแห่งโชค ความสำเร็จ และพลังงานดีๆ"
},

{
icon:"🗡️",
name:"The Sword",
meaning:"ต้องตัดสินใจเรื่องสำคัญ และระวังคำพูด"
},

{
icon:"💜",
name:"The Heart",
meaning:"ดวงความรักเด่น มีคนกำลังคิดถึงคุณ"
},

{
icon:"🔥",
name:"The Flame",
meaning:"พลังชีวิตกำลังเปลี่ยนแปลงครั้งใหญ่"
},

{
icon:"👁️",
name:"The Eye",
meaning:"สัญชาตญาณของคุณกำลังแม่นยำมาก"
}

]

/* START */

function startReading(){

    const name =
        document.getElementById("name").value

    if(name === ""){
        alert("กรุณากรอกชื่อ")
        return
    }

    const cards =
        document.getElementById("cards")

    cards.innerHTML = ""

    const selected = []

    for(let i=0;i<3;i++){

        const random =
            tarot[Math.floor(Math.random()*tarot.length)]

        selected.push(random)

        cards.innerHTML += `

        <div class="tarot-card" id="card${i}">
        
            <div class="front">
                ✨
            </div>

            <div class="back">
                <div style="font-size:50px;">
                    ${random.icon}
                </div>

                <h2>${random.name}</h2>

                <p>${random.meaning}</p>
            </div>

        </div>

        `

    }

    /* FLIP ANIMATION */

    setTimeout(()=>{
        document.getElementById("card0").classList.add("flip")
    },700)

    setTimeout(()=>{
        document.getElementById("card1").classList.add("flip")
    },1500)

    setTimeout(()=>{
        document.getElementById("card2").classList.add("flip")
    },2300)

    /* FINAL RESULT */

    setTimeout(()=>{

        const combined =
        `${name}... ไพ่ทั้งสามใบกำลังบอกว่าชีวิตของคุณกำลังเข้าสู่ช่วงเปลี่ยนแปลงสำคัญ 
        ช่วงนี้พลังงานรอบตัวแรงมาก มีทั้งโอกาสใหม่และบางสิ่งที่ต้องตัดสินใจ 
        โดยเฉพาะเรื่องความสัมพันธ์และอนาคต จะมีบางอย่างเข้ามาแบบไม่คาดคิด 
        แต่สุดท้ายเส้นทางของคุณกำลังมุ่งไปในทางที่ดีขึ้น`

        document.getElementById("finalText").innerHTML =
            combined

        document.getElementById("finalBox").style.display =
            "block"

        document.getElementById("aura").style.width =
            Math.floor(Math.random()*30+70)+"%"

        document.getElementById("love").style.width =
            Math.floor(Math.random()*40+50)+"%"

        document.getElementById("fortune").style.width =
            Math.floor(Math.random()*30+70)+"%"

        /* SAVE LOCAL */

        const history =
            JSON.parse(localStorage.getItem("tarotHistory")) || []

        history.unshift({
            date:new Date().toLocaleString("th-TH"),
            text:combined,
            cards:selected.map(c=>c.name).join(", ")
        })

        localStorage.setItem(
            "tarotHistory",
            JSON.stringify(history)
        )

        loadHistory()

    },3200)

}

/* LOAD HISTORY */

function loadHistory(){

    const history =
        JSON.parse(localStorage.getItem("tarotHistory")) || []

    const box =
        document.getElementById("history")

    box.innerHTML = ""

    if(history.length === 0){

        box.innerHTML =
            `<div style="opacity:.5;margin-top:15px;">ยังไม่มีประวัติ</div>`

        return
    }

    history.slice(0,10).forEach(item=>{

        box.innerHTML += `

        <div class="history-item">

            <div class="date">
                ${item.date}
            </div>

            <h3>
                🔮 ${item.cards}
            </h3>

            <p style="margin-top:10px;opacity:.8;line-height:1.7;">
                ${item.text}
            </p>

        </div>

        `

    })

}

</script>

</body>
</html>
